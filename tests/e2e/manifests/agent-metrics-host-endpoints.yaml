apiVersion: v1
kind: Endpoints
metadata:
  name: spotvortex-agent-metrics
  namespace: spotvortex-system
  labels:
    app: spotvortex-agent
subsets:
  - addresses:
      # Docker Desktop host gateway as seen from kind nodes on macOS.
      # This is opt-in only because it can accidentally scrape unrelated services on :8080.
      - ip: 192.168.65.254
    ports:
      - name: metrics
        port: 8080
        protocol: TCP
