apiVersion: v1
kind: Service
metadata:
  name: spotvortex-agent-metrics
  namespace: spotvortex-system
  labels:
    app: spotvortex-agent
    spotvortex.io/metrics: "true"
spec:
  # Safe default: service-based scrape target for an in-cluster SpotVortex agent.
  # This avoids accidentally scraping unrelated host services on :8080.
  selector:
    app: spotvortex-agent
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
